# Pre-commit hooks for Sentinel-Linux 2.0.
# Run `pre-commit install` once after cloning. CI runs `pre-commit run --all-files`.

minimum_pre_commit_version: "4.0.0"
default_language_version:
  python: python3.12
fail_fast: false

repos:
  # --- Hygiene -----------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: debug-statements
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # --- Ruff (lint + format) ---------------------------------------------
  # Keep this rev in lock-step with the `ruff` version in uv.lock: the CI
  # `quality` job format-checks with the locked ruff while the `precommit` job
  # uses this hook, and the two formatters must agree.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  # --- Bandit (security lint, src only) ---------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "src/"]
        additional_dependencies: ["bandit[toml]"]
        pass_filenames: false

  # --- Secret scanning ---------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: |
          (?x)^(
            \.secrets\.baseline|
            uv\.lock|
            \.env\.example|
            tests/fixtures/.*
          )$

  # --- Mypy (strict, first-party only) ----------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: ["--config-file=pyproject.toml"]
        additional_dependencies:
          - pydantic>=2.8
          - pydantic-settings>=2.5
          - structlog>=24.4
          - httpx>=0.27
        files: ^src/sentinel/
